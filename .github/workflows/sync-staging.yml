# Sync main → staging — manually triggered to promote main to staging.
#
# Purpose:
#   Force-pushes `main` to `staging` so that `staging` is always an exact copy
#   of `main` with no divergent history.
#
# Why manual (workflow_dispatch) instead of automatic:
#   Previously triggered by repository_dispatch alongside E2E tests. This caused
#   a cascade: merge to main → Vercel deploys → dispatch fires sync + E2E →
#   sync pushes to staging → Vercel deploys staging → new dispatch fires →
#   second E2E run cancels the first (concurrency group). Making sync manual
#   prevents this cascade and lets E2E runs complete uninterrupted.
#
# Why SYNC_PAT instead of GITHUB_TOKEN:
#   Pushes made with the default GITHUB_TOKEN do not trigger Vercel's native
#   git integration. Using a Personal Access Token (SYNC_PAT) ensures that the
#   force-push to `staging` is detected by Vercel, which then creates a preview
#   deployment with branch-scoped environment overrides.
name: Sync main → staging

on:
  workflow_dispatch:

permissions:
  contents: read

# Prevent concurrent pushes from conflicting on the staging branch.
# If a new deployment arrives while a sync is in progress, cancel the old one.
concurrency:
  group: sync-staging
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  sync:
    name: Sync main → staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main (full clone with SYNC_PAT)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Force-push main to staging
        run: |
          echo "Force-pushing main to staging..."
          git push origin main:staging --force
