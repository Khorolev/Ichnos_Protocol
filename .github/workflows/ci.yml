name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-client:
    name: Client — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --run

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ci-stub
          VITE_FIREBASE_AUTH_DOMAIN: ci-stub.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-stub
          VITE_FIREBASE_STORAGE_BUCKET: ci-stub.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: 1:000000000000:web:ci-stub
          VITE_API_BASE_URL: https://ci-stub.vercel.app
          VITE_CALENDLY_URL: https://calendly.com/ci-stub
        run: npm run build

  lint-and-test-server:
    name: Server — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --run
