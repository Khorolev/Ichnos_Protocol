# Required check name: "E2E Tests (Playwright)"
# This name is registered as a required status check in GitHub rulesets
# for main. Do not rename without updating rulesets.
#
# Triggers on Vercel deployment_status events. Runs Playwright E2E tests
# against the client preview URL after a successful deployment_status event.
# Preview vs production and client vs server decisions are handled by
# hostname routing inside the "Validate deployment target" step.
#
# Routing is hostname-based via deployment_status.target_url:
#   Custom domains:
#     - staging-client.ichnos-protocol.com → client deployment → run E2E
#     - staging-api.ichnos-protocol.com → server deployment → skip E2E
#   Auto-preview URLs — git-branch pattern:
#     - ichnos-protocol-git-* (excluding server variants) → client → run E2E
#     - ichnos-protocol-server-git-* OR ichnos-protocolserver-git-* → server → skip E2E
#   Auto-preview URLs — hash-based pattern:
#     - ichnos-protocol-*-khorolevs-projects.vercel.app (excluding ichnos-protocolserver-*) → client → run E2E
#     - ichnos-protocolserver-*-khorolevs-projects.vercel.app → server → skip E2E
#   Production domains (*.vercel.app, ichnos-protocol.com):
#     - Skipped — production deployments do not trigger E2E in this workflow
#   Unknown hostname → fail fast
#
# DB source for migration/seeding:
#   Resolved from the Neon-managed preview branch via Neon REST API.
#   Branch name is preview/<git-branch> (Neon Vercel integration convention).
#   Git branch extracted from (in priority order): github.ref_name,
#   preview URL hostname, deployment payload metadata, GitHub API
#   commit-to-branch lookup, or repository git-history fallback.
name: E2E Tests on Preview

on:
  deployment_status:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  e2e:
    name: E2E Tests (Playwright)
    # Run on every successful deployment_status event so the check name is
    # always emitted (required by branch protection). Client/server and
    # preview routing decisions are handled inside "Validate deployment target".
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Validate deployment target
        id: check
        env:
          TARGET_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          echo "Deployment target URL: $TARGET_URL"
          # Extract hostname from target URL
          HOSTNAME=$(echo "$TARGET_URL" | sed -E 's|https?://([^/]+).*|\1|')
          echo "Extracted hostname: $HOSTNAME"

          if [[ "$HOSTNAME" == "staging-client.ichnos-protocol.com" ]]; then
            echo "Client deployment detected (custom domain). Running E2E tests."
            echo "is_client=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HOSTNAME" == "staging-api.ichnos-protocol.com" ]]; then
            echo "Server deployment detected (custom domain); E2E intentionally skipped."
            echo "is_client=false" >> "$GITHUB_OUTPUT"
          elif [[ "$HOSTNAME" == ichnos-protocol-server-git-* ]] || [[ "$HOSTNAME" == ichnos-protocolserver-git-* ]]; then
            echo "Server deployment detected (auto-preview URL: $HOSTNAME); E2E intentionally skipped."
            echo "is_client=false" >> "$GITHUB_OUTPUT"
          elif [[ "$HOSTNAME" == ichnos-protocol-git-* ]]; then
            echo "Client deployment detected (auto-preview URL: $HOSTNAME). Running E2E tests."
            echo "is_client=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HOSTNAME" == ichnos-protocolserver-*-khorolevs-projects.vercel.app ]]; then
            echo "Server deployment detected (hash-based preview URL: $HOSTNAME); E2E intentionally skipped."
            echo "is_client=false" >> "$GITHUB_OUTPUT"
          elif [[ "$HOSTNAME" == ichnos-protocol-*-khorolevs-projects.vercel.app ]]; then
            echo "Client deployment detected (hash-based preview URL: $HOSTNAME). Running E2E tests."
            echo "is_client=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HOSTNAME" == *.vercel.app ]] || [[ "$HOSTNAME" == ichnos-protocol.com ]] || [[ "$HOSTNAME" == *.ichnos-protocol.com ]]; then
            echo "Production deployment detected ($HOSTNAME); E2E intentionally skipped."
            echo "is_client=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unknown deployment target pattern: $TARGET_URL (hostname: $HOSTNAME)"
            exit 1
          fi

      - name: Checkout repository
        if: steps.check.outputs.is_client == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}
          fetch-depth: 0

      - name: Resolve effective DB URL
        id: db
        if: steps.check.outputs.is_client == 'true'
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          DEPLOYMENT_REF: ${{ github.event.deployment.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          TARGET_URL: ${{ github.event.deployment_status.target_url }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [[ -z "$NEON_API_KEY" ]]; then
            echo "::error::NEON_API_KEY secret is required for Neon-managed preview branch lookup."
            exit 1
          fi

          if [[ -z "$NEON_PROJECT_ID" ]]; then
            echo "::error::NEON_PROJECT_ID repository variable is required for Neon-managed preview branch lookup."
            exit 1
          fi

          NEON_API_BASE="https://console.neon.tech/api/v2"
          MAX_ATTEMPTS=6
          SLEEP_SECONDS=5

          echo "=== Neon preview branch resolution ==="
          echo "deployment.ref: $DEPLOYMENT_REF"
          echo "github.ref_name: $GITHUB_REF_NAME"
          echo "target_url: $TARGET_URL"
          echo "Retry policy: $MAX_ATTEMPTS attempts × ${SLEEP_SECONDS}s backoff"

          # Debug: dump deployment event payload structure for troubleshooting
          echo "--- Deployment event payload debug ---"
          jq '{
            "deployment.ref": .deployment.ref,
            "deployment.environment": .deployment.environment,
            "deployment.payload_keys": (.deployment.payload | keys? // "n/a"),
            "deployment.payload.meta": .deployment.payload.meta?,
            "deployment.payload.deployment.meta": .deployment.payload.deployment?.meta?,
            "deployment.payload.githubCommitRef": .deployment.payload.githubCommitRef?,
            "deployment.payload.branch": .deployment.payload.branch?,
            "deployment.payload.ref": .deployment.payload.ref?
          }' "$GITHUB_EVENT_PATH" 2>/dev/null || echo "(debug extraction failed — non-blocking)"
          echo "--- End payload debug ---"

          # Vercel deployment_status often sets deployment.ref to commit SHA.
          # Gather branch-ref candidates from multiple sources, then map to preview/<ref>.
          #
          # Sources (in priority order):
          #   1. github.ref_name — GitHub context, typically the branch for deployment_status events
          #   2. Git-branch pattern in preview URL — e.g. ichnos-protocol-git-branch-name-*
          #   3. Deployment payload metadata — various Vercel payload structures
          #   4. GitHub API fallback — branches-where-head and PR head refs
          #   5. Repository git-history fallback — branches containing deployment SHA
          #   6. deployment.ref — often a commit SHA (filtered later)
          ALL_CANDIDATES=()

          # Source 1: github.ref_name
          if [[ -n "$GITHUB_REF_NAME" ]]; then
            echo "Source 1 (github.ref_name): $GITHUB_REF_NAME"
            ALL_CANDIDATES+=("$GITHUB_REF_NAME")
          fi

          # Source 2: extract branch name from git-branch pattern in target URL
          # e.g. ichnos-protocol-git-e2e-testing-<owner-hash>.vercel.app → e2e-testing
          if [[ -n "$TARGET_URL" ]]; then
            URL_HOSTNAME=$(echo "$TARGET_URL" | sed -E 's|https?://([^/]+).*|\1|')
            URL_BRANCH=$(echo "$URL_HOSTNAME" | sed -nE 's/^ichnos-protocol-git-(.+)-[a-z0-9]+-khorolevs-projects\.vercel\.app$/\1/p')
            if [[ -n "$URL_BRANCH" ]]; then
              echo "Source 2 (URL hostname → branch): $URL_BRANCH"
              ALL_CANDIDATES+=("$URL_BRANCH")
            fi
          fi

          # Source 3: deployment payload metadata (various Vercel payload structures)
          PAYLOAD_REFS=$(jq -r '
            [
              .deployment.payload.deployment.meta.githubCommitRef,
              .deployment.payload.meta.githubCommitRef,
              .deployment.payload.githubCommitRef,
              .deployment.payload.branch,
              .deployment.payload.ref,
              .deployment.ref
            ]
            | map(select(type == "string" and length > 0))
            | unique
            | .[]
          ' "$GITHUB_EVENT_PATH" 2>/dev/null || true)

          if [[ -n "$PAYLOAD_REFS" ]]; then
            while IFS= read -r ref; do
              ref=$(echo "$ref" | sed -E 's#^refs/heads/##')
              if [[ -n "$ref" ]]; then
                echo "Source 3 (payload): $ref"
                ALL_CANDIDATES+=("$ref")
              fi
            done <<< "$PAYLOAD_REFS"
          fi

          # Deduplicate and filter out commit SHAs
          mapfile -t UNIQUE_CANDIDATES < <(printf '%s\n' "${ALL_CANDIDATES[@]}" | awk 'NF' | awk '!seen[$0]++')

          FILTERED_REF_CANDIDATES=()
          for candidate in "${UNIQUE_CANDIDATES[@]}"; do
            if [[ "$candidate" =~ ^[0-9a-f]{40}$ ]]; then
              echo "Filtering out SHA-like candidate: $candidate"
              continue
            fi
            FILTERED_REF_CANDIDATES+=("$candidate")
          done

          # Source 4: GitHub API fallback — only if no candidates yet and we have a SHA
          if [[ ${#FILTERED_REF_CANDIDATES[@]} -eq 0 ]] && [[ "$DEPLOYMENT_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "No branch candidates from sources 1-3; trying GitHub API for commit $DEPLOYMENT_REF..."

            GH_BRANCHES=$(curl --silent --show-error \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/commits/$DEPLOYMENT_REF/branches-where-head" 2>/dev/null || true)

            while IFS= read -r name; do
              if [[ -n "$name" ]]; then
                echo "Source 4a (branches-where-head): $name"
                FILTERED_REF_CANDIDATES+=("$name")
              fi
            done < <(echo "$GH_BRANCHES" | jq -r '.[]?.name // empty' 2>/dev/null)

            GH_PRS=$(curl --silent --show-error \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/commits/$DEPLOYMENT_REF/pulls" 2>/dev/null || true)

            while IFS= read -r pr_ref; do
              if [[ -n "$pr_ref" ]]; then
                echo "Source 4b (PR head ref): $pr_ref"
                FILTERED_REF_CANDIDATES+=("$pr_ref")
              fi
            done < <(echo "$GH_PRS" | jq -r '.[].head.ref // empty' 2>/dev/null)

            # Deduplicate
            if [[ ${#FILTERED_REF_CANDIDATES[@]} -gt 0 ]]; then
              mapfile -t FILTERED_REF_CANDIDATES < <(printf '%s\n' "${FILTERED_REF_CANDIDATES[@]}" | awk 'NF' | awk '!seen[$0]++')
            fi
          fi

          # Source 5: repository git-history fallback — branches that contain deployment SHA.
          if [[ ${#FILTERED_REF_CANDIDATES[@]} -eq 0 ]] && [[ "$DEPLOYMENT_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "No branch candidates from sources 1-4; trying repository git-history contains lookup for commit $DEPLOYMENT_REF..."

            mapfile -t GIT_CONTAINS_BRANCHES < <(
              git for-each-ref --contains "$DEPLOYMENT_REF" --format='%(refname:short)' refs/remotes/origin 2>/dev/null \
                | sed -E 's#^origin/##' \
                | grep -Ev '^(HEAD|main\^0)$' \
                | awk 'NF' \
                | awk '!seen[$0]++'
            )

            if [[ ${#GIT_CONTAINS_BRANCHES[@]} -gt 0 ]]; then
              echo "Source 5 (git contains): ${GIT_CONTAINS_BRANCHES[*]}"
              for branch_name in "${GIT_CONTAINS_BRANCHES[@]}"; do
                FILTERED_REF_CANDIDATES+=("$branch_name")
              done
              mapfile -t FILTERED_REF_CANDIDATES < <(printf '%s\n' "${FILTERED_REF_CANDIDATES[@]}" | awk 'NF' | awk '!seen[$0]++')
            fi
          fi

          echo "Final branch ref candidates: ${FILTERED_REF_CANDIDATES[*]:-(none)}"

          if [[ ${#FILTERED_REF_CANDIDATES[@]} -eq 0 ]]; then
            echo "::warning::No branch ref candidates found. Listing all Neon branches for diagnosis:"
            curl --silent --show-error \
              -H "Authorization: Bearer $NEON_API_KEY" \
              "$NEON_API_BASE/projects/$NEON_PROJECT_ID/branches" 2>/dev/null \
              | jq -r '.branches[]? | "  \(.name) (id: \(.id), created: \(.created_at))"' || echo "(failed to list)"
            echo "::error::No usable branch ref candidate found for Neon preview branch lookup (project '$NEON_PROJECT_ID', deployment.ref='$DEPLOYMENT_REF', github.ref_name='$GITHUB_REF_NAME')."
            exit 1
          fi

          CANDIDATE_LABEL=$(printf "%s " "${FILTERED_REF_CANDIDATES[@]}")
          echo "Neon preview branch ref candidates: $CANDIDATE_LABEL"

          BRANCH_ID=""
          RESOLVED_BRANCH_NAME=""
          for ref_candidate in "${FILTERED_REF_CANDIDATES[@]}"; do
            BRANCH_NAME="preview/$ref_candidate"
            ENCODED_BRANCH_NAME=$(jq -rn --arg v "$BRANCH_NAME" '$v|@uri')
            echo "Trying Neon preview branch candidate: $BRANCH_NAME"

            for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
              BRANCHES_RESPONSE=$(curl --fail --silent --show-error \
                -H "Authorization: Bearer $NEON_API_KEY" \
                "$NEON_API_BASE/projects/$NEON_PROJECT_ID/branches?search=$ENCODED_BRANCH_NAME" || true)

              BRANCH_ID=$(echo "$BRANCHES_RESPONSE" | jq -r --arg name "$BRANCH_NAME" '
                .branches
                | map(select(.name == $name))
                | .[0].id // empty
              ')

              if [[ -n "$BRANCH_ID" ]]; then
                RESOLVED_BRANCH_NAME="$BRANCH_NAME"
                echo "Resolved Neon branch '$RESOLVED_BRANCH_NAME' on attempt $attempt/$MAX_ATTEMPTS: $BRANCH_ID"
                break 2
              fi

              if [[ "$attempt" -lt "$MAX_ATTEMPTS" ]]; then
                echo "Neon-managed preview branch '$BRANCH_NAME' not visible yet (attempt $attempt/$MAX_ATTEMPTS). Retrying in ${SLEEP_SECONDS}s..."
                sleep "$SLEEP_SECONDS"
              fi
            done
          done

          if [[ -z "$BRANCH_ID" ]]; then
            echo "::warning::No Neon branch matched candidates. Listing all Neon branches for diagnosis:"
            curl --silent --show-error \
              -H "Authorization: Bearer $NEON_API_KEY" \
              "$NEON_API_BASE/projects/$NEON_PROJECT_ID/branches" 2>/dev/null \
              | jq -r '.branches[]? | "  \(.name) (id: \(.id), created: \(.created_at))"' || echo "(failed to list)"
            echo "::error::Failed to resolve Neon-managed preview branch in project '$NEON_PROJECT_ID' after trying candidates '$CANDIDATE_LABEL' (mapped as preview/<ref>) with $MAX_ATTEMPTS attempts each."
            exit 1
          fi

          EFFECTIVE_DB_URL=""
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            CONNECTION_RESPONSE=$(curl --fail --silent --show-error \
              -H "Authorization: Bearer $NEON_API_KEY" \
              "$NEON_API_BASE/projects/$NEON_PROJECT_ID/connection-uri?branch_id=$BRANCH_ID&role_name=neondb_owner&database_name=neondb" || true)

            EFFECTIVE_DB_URL=$(echo "$CONNECTION_RESPONSE" | jq -r '.uri // .connection_uri // empty')

            if [[ -n "$EFFECTIVE_DB_URL" ]]; then
              echo "Resolved connection URI on attempt $attempt/$MAX_ATTEMPTS"
              break
            fi

            if [[ "$attempt" -lt "$MAX_ATTEMPTS" ]]; then
              echo "Connection URI not available yet for branch '$RESOLVED_BRANCH_NAME' (id: $BRANCH_ID) on attempt $attempt/$MAX_ATTEMPTS. Retrying in ${SLEEP_SECONDS}s..."
              sleep "$SLEEP_SECONDS"
            fi
          done

          if [[ -z "$EFFECTIVE_DB_URL" ]]; then
            echo "::error::Failed to resolve connection URI for Neon-managed preview branch '$RESOLVED_BRANCH_NAME' in project '$NEON_PROJECT_ID' (branch id: '$BRANCH_ID') after $MAX_ATTEMPTS attempts."
            exit 1
          fi

          echo "effective_db_url=$EFFECTIVE_DB_URL" >> "$GITHUB_OUTPUT"
          echo "db_source=Neon-managed preview branch" >> "$GITHUB_OUTPUT"
          echo "Effective DB URL resolved from Neon-managed preview branch."

      - name: Setup Node.js
        if: steps.check.outputs.is_client == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        if: steps.check.outputs.is_client == 'true'
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers (Chromium only for preview)
        if: steps.check.outputs.is_client == 'true'
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Install server dependencies
        if: steps.check.outputs.is_client == 'true'
        working-directory: server
        run: npm ci --omit=dev

      - name: Run migrations
        if: steps.check.outputs.is_client == 'true'
        working-directory: server
        env:
          DATABASE_URL: ${{ steps.db.outputs.effective_db_url }}
        run: |
          echo "Running migrations against effective DB URL..."
          node scripts/runMigrations.js

      - name: Seed E2E test data
        if: steps.check.outputs.is_client == 'true'
        working-directory: server
        env:
          DATABASE_URL: ${{ steps.db.outputs.effective_db_url }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_UID: ${{ secrets.E2E_ADMIN_UID }}
          E2E_USER_UID: ${{ secrets.E2E_USER_UID }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_SUPER_ADMIN_UID: ${{ secrets.E2E_SUPER_ADMIN_UID }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
        run: node scripts/seedE2EData.js

      - name: Run Playwright tests (Chromium only for preview)
        id: playwright
        if: steps.check.outputs.is_client == 'true'
        working-directory: e2e
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          E2E_BROWSER_PROFILE: chromium
          E2E_WORKERS: "1"
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ADMIN_UID: ${{ secrets.E2E_ADMIN_UID }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: ${{ always() && steps.check.outputs.is_client == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright partial test results
        if: ${{ always() && steps.check.outputs.is_client == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Job summary
        if: always()
        env:
          TARGET_URL: ${{ github.event.deployment_status.target_url }}
          IS_CLIENT: ${{ steps.check.outputs.is_client }}
          CHECK_OUTCOME: ${{ steps.check.outcome }}
          PW_OUTCOME: ${{ steps.playwright.outcome }}
          DB_SOURCE: ${{ steps.db.outputs.db_source }}
        run: |
          # Determine human-readable outcome label
          if [[ "$CHECK_OUTCOME" == "failure" ]]; then
            OUTCOME_LABEL="fail-fast: unknown deployment target pattern"
          elif [[ "$IS_CLIENT" == "false" ]]; then
            OUTCOME_LABEL="intentionally skipped (non-client deployment)"
          elif [[ "$PW_OUTCOME" == "success" ]]; then
            OUTCOME_LABEL="tests executed — passed"
          elif [[ "$PW_OUTCOME" == "failure" ]]; then
            OUTCOME_LABEL="tests executed — failed"
          elif [[ "$PW_OUTCOME" == "cancelled" ]]; then
            OUTCOME_LABEL="tests executed — cancelled"
          elif [[ "$PW_OUTCOME" == "skipped" ]]; then
            OUTCOME_LABEL="tests skipped"
          else
            OUTCOME_LABEL="unknown (check=$CHECK_OUTCOME, playwright=$PW_OUTCOME)"
          fi

          # Log to console
          echo "=== E2E Job Summary ==="
          echo "Target URL:     $TARGET_URL"
          echo "Is client:      $IS_CLIENT"
          echo "DB source:      $DB_SOURCE"
          echo "Check step:     $CHECK_OUTCOME"
          echo "Playwright step: $PW_OUTCOME"
          echo "Outcome:        $OUTCOME_LABEL"
          echo "========================"

          # Write to GitHub job summary
          {
            echo "## E2E Tests — Job Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Target URL** | \`$TARGET_URL\` |"
            echo "| **Is client** | \`$IS_CLIENT\` |"
            echo "| **DB source** | $DB_SOURCE |"
            echo "| **Check step** | \`$CHECK_OUTCOME\` |"
            echo "| **Playwright step** | \`$PW_OUTCOME\` |"
            echo "| **Outcome** | $OUTCOME_LABEL |"
          } >> "$GITHUB_STEP_SUMMARY"
