# Required check name: "E2E Tests (Playwright)"
# This name is registered as a required status check in GitHub rulesets
# for main. Do not rename without updating rulesets.
#
# Triggers on Vercel deployment_status events. Runs Playwright E2E tests
# against the client preview URL after a successful deployment_status event.
# Preview vs production and client vs server decisions are handled by
# hostname routing inside the "Validate deployment target" step.
#
# Routing is hostname-based via deployment_status.target_url:
#   Custom domains:
#     - staging-client.ichnos-protocol.com → client deployment → run E2E
#     - staging-api.ichnos-protocol.com → server deployment → skip E2E
#   Auto-preview URLs — git-branch pattern:
#     - ichnos-protocol-git-* (excluding server variants) → client → run E2E
#     - ichnos-protocol-server-git-* OR ichnos-protocolserver-git-* → server → skip E2E
#   Auto-preview URLs — hash-based pattern:
#     - ichnos-protocol-*-khorolevs-projects.vercel.app (excluding ichnos-protocolserver-*) → client → run E2E
#     - ichnos-protocolserver-*-khorolevs-projects.vercel.app → server → skip E2E
#   Production domains (*.vercel.app, ichnos-protocol.com):
#     - Skipped — production deployments do not trigger E2E in this workflow
#   Unknown hostname → fail fast
#
# DB source for migration/seeding:
#   By default, uses PREVIEW_DATABASE_URL secret — the same DB the preview
#   API runtime reads at process.env.DATABASE_URL. This ensures seeded data
#   is visible through the preview URL traffic path.
#   Set repository variable USE_EPHEMERAL_NEON=true to create an ephemeral
#   Neon branch instead (only useful when the preview API runtime is
#   dynamically wired to the ephemeral branch).
name: E2E Tests on Preview

on:
  deployment_status:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  e2e:
    name: E2E Tests (Playwright)
    # Run on every successful deployment_status event so the check name is
    # always emitted (required by branch protection). Client/server and
    # preview routing decisions are handled inside "Validate deployment target".
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Validate deployment target
        id: check
        env:
          TARGET_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          echo "Deployment target URL: $TARGET_URL"
          # Extract hostname from target URL
          HOSTNAME=$(echo "$TARGET_URL" | sed -E 's|https?://([^/]+).*|\1|')
          echo "Extracted hostname: $HOSTNAME"

          if [[ "$HOSTNAME" == "staging-client.ichnos-protocol.com" ]]; then
            echo "Client deployment detected (custom domain). Running E2E tests."
            echo "is_client=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HOSTNAME" == "staging-api.ichnos-protocol.com" ]]; then
            echo "Server deployment detected (custom domain); E2E intentionally skipped."
            echo "is_client=false" >> "$GITHUB_OUTPUT"
          elif [[ "$HOSTNAME" == ichnos-protocol-server-git-* ]] || [[ "$HOSTNAME" == ichnos-protocolserver-git-* ]]; then
            echo "Server deployment detected (auto-preview URL: $HOSTNAME); E2E intentionally skipped."
            echo "is_client=false" >> "$GITHUB_OUTPUT"
          elif [[ "$HOSTNAME" == ichnos-protocol-git-* ]]; then
            echo "Client deployment detected (auto-preview URL: $HOSTNAME). Running E2E tests."
            echo "is_client=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HOSTNAME" == ichnos-protocolserver-*-khorolevs-projects.vercel.app ]]; then
            echo "Server deployment detected (hash-based preview URL: $HOSTNAME); E2E intentionally skipped."
            echo "is_client=false" >> "$GITHUB_OUTPUT"
          elif [[ "$HOSTNAME" == ichnos-protocol-*-khorolevs-projects.vercel.app ]]; then
            echo "Client deployment detected (hash-based preview URL: $HOSTNAME). Running E2E tests."
            echo "is_client=true" >> "$GITHUB_OUTPUT"
          elif [[ "$HOSTNAME" == *.vercel.app ]] || [[ "$HOSTNAME" == ichnos-protocol.com ]] || [[ "$HOSTNAME" == *.ichnos-protocol.com ]]; then
            echo "Production deployment detected ($HOSTNAME); E2E intentionally skipped."
            echo "is_client=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unknown deployment target pattern: $TARGET_URL (hostname: $HOSTNAME)"
            exit 1
          fi

      - name: Resolve effective DB URL
        id: db
        if: steps.check.outputs.is_client == 'true'
        env:
          PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
          USE_EPHEMERAL_NEON: ${{ vars.USE_EPHEMERAL_NEON }}
        run: |
          # Determine DB source strategy
          if [[ "$USE_EPHEMERAL_NEON" == "true" ]]; then
            echo "DB source: ephemeral Neon branch (opt-in via USE_EPHEMERAL_NEON)"
            echo "use_neon=true" >> "$GITHUB_OUTPUT"
          else
            echo "DB source: preview runtime DB (PREVIEW_DATABASE_URL secret)"
            echo "use_neon=false" >> "$GITHUB_OUTPUT"

            if [[ -z "$PREVIEW_DATABASE_URL" ]]; then
              echo "::error::PREVIEW_DATABASE_URL secret is not set. This secret must match the DATABASE_URL configured in the Vercel preview environment for the server project."
              exit 1
            fi

            echo "effective_db_url=$PREVIEW_DATABASE_URL" >> "$GITHUB_OUTPUT"
            echo "Effective DB URL resolved from PREVIEW_DATABASE_URL secret."
          fi

      - name: Checkout repository
        if: steps.check.outputs.is_client == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Setup Node.js
        if: steps.check.outputs.is_client == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        if: steps.check.outputs.is_client == 'true'
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers (Chromium only for preview)
        if: steps.check.outputs.is_client == 'true'
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Create Neon DB branch
        id: neon
        if: steps.check.outputs.is_client == 'true' && steps.db.outputs.use_neon == 'true'
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: e2e-${{ github.run_id }}

      - name: Set effective DB URL from Neon branch
        if: steps.check.outputs.is_client == 'true' && steps.db.outputs.use_neon == 'true'
        id: neon_db
        env:
          NEON_DB_URL: ${{ steps.neon.outputs.db_url }}
        run: |
          if [[ -z "$NEON_DB_URL" ]]; then
            echo "::error::Neon branch creation succeeded but db_url output is empty."
            exit 1
          fi
          echo "effective_db_url=$NEON_DB_URL" >> "$GITHUB_OUTPUT"
          echo "Effective DB URL resolved from ephemeral Neon branch."

      - name: Install server dependencies
        if: steps.check.outputs.is_client == 'true'
        working-directory: server
        run: npm ci --omit=dev

      - name: Run migrations
        if: steps.check.outputs.is_client == 'true'
        working-directory: server
        env:
          DATABASE_URL: ${{ steps.db.outputs.use_neon == 'true' && steps.neon_db.outputs.effective_db_url || steps.db.outputs.effective_db_url }}
        run: |
          echo "Running migrations against effective DB URL..."
          node scripts/runMigrations.js

      - name: Seed E2E test data
        if: steps.check.outputs.is_client == 'true'
        working-directory: server
        env:
          DATABASE_URL: ${{ steps.db.outputs.use_neon == 'true' && steps.neon_db.outputs.effective_db_url || steps.db.outputs.effective_db_url }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_UID: ${{ secrets.E2E_ADMIN_UID }}
          E2E_USER_UID: ${{ secrets.E2E_USER_UID }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_SUPER_ADMIN_UID: ${{ secrets.E2E_SUPER_ADMIN_UID }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
        run: node scripts/seedE2EData.js

      - name: Verify seeded data visibility via preview API (primary)
        if: steps.check.outputs.is_client == 'true'
        working-directory: e2e
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ADMIN_UID: ${{ secrets.E2E_ADMIN_UID }}
        run: |
          echo "=== Seeded Data Visibility Check (Preview API Runtime Path) ==="
          echo "Authenticating as admin through preview UI and validating /api/admin/requests response via BASE_URL traffic path..."

          node --input-type=module -e "
            import { chromium } from '@playwright/test';

            const baseUrl = process.env.BASE_URL;
            const adminEmail = process.env.E2E_ADMIN_EMAIL;
            const adminPassword = process.env.E2E_ADMIN_PASSWORD;
            const adminUid = process.env.E2E_ADMIN_UID;

            if (!baseUrl || !adminEmail || !adminPassword || !adminUid) {
              console.error('FAIL: Missing required env vars for preview API seed visibility probe.');
              process.exit(1);
            }

            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext();
            const page = await context.newPage();

            try {
              await page.goto(baseUrl, { waitUntil: 'domcontentloaded' });
              await page.getByRole('button', { name: 'Login' }).click();
              await page.getByLabel('Email').fill(adminEmail);
              await page.getByLabel('Password').fill(adminPassword);
              await page.locator('button[type=\"submit\"]').click();
              await page.locator('.user-menu-toggle').waitFor({ state: 'visible', timeout: 20000 });

              const apiPath = '/api/admin/requests/' + encodeURIComponent(adminUid);
              const responsePromise = page.waitForResponse((resp) => {
                const url = resp.url();
                return resp.request().method() === 'GET' && url.includes(apiPath);
              }, { timeout: 30000 });

              await page.goto(baseUrl + '/admin', { waitUntil: 'domcontentloaded' });
              const response = await responsePromise;

              if (response.status() >= 400) {
                console.error('FAIL: Preview admin requests API returned status', response.status());
                process.exit(1);
              }

              const body = await response.json();
              const rows = Array.isArray(body?.data) ? body.data : [];

              const hasSeededRequest = rows.some((row) => {
                const rowUserId = String(row?.user_id ?? '');
                const preview = String(row?.questionPreview ?? '');
                return rowUserId === adminUid && preview.includes('E2E test question');
              });

              console.log('API endpoint URL:', response.url());
              console.log('Rows returned:', rows.length);
              console.log('Contains seeded admin request:', hasSeededRequest);

              if (!hasSeededRequest) {
                console.error('FAIL: Preview API path did not return seeded admin contact-request data.');
                process.exit(1);
              }

              console.log('Preview API seed visibility check PASSED.');
            } catch (err) {
              console.error('Preview API seed visibility check FAILED:', err?.message || err);
              process.exit(1);
            } finally {
              await context.close();
              await browser.close();
            }
          "

      - name: Observe seeded data in effective DB (secondary)
        if: steps.check.outputs.is_client == 'true'
        continue-on-error: true
        working-directory: server
        env:
          DATABASE_URL: ${{ steps.db.outputs.use_neon == 'true' && steps.neon_db.outputs.effective_db_url || steps.db.outputs.effective_db_url }}
          E2E_ADMIN_UID: ${{ secrets.E2E_ADMIN_UID }}
        run: |
          echo "=== Seeded Data Observability Check (Direct DB) ==="
          echo "This check is informational only. Primary visibility guarantee is the preview API runtime-path check."

          node --input-type=module -e "
            import pg from 'pg';
            const pool = new pg.Pool({ connectionString: process.env.DATABASE_URL });
            try {
              const users = await pool.query('SELECT firebase_uid FROM users WHERE firebase_uid = \$1', [process.env.E2E_ADMIN_UID]);
              const requests = await pool.query('SELECT id, status FROM contact_requests WHERE user_id = \$1', [process.env.E2E_ADMIN_UID]);

              console.log('DB observability - admin user present:', users.rows.length > 0);
              console.log('DB observability - contact requests for admin:', requests.rows.length);
              console.log('DB observability check completed.');
            } catch (err) {
              console.error('DB observability check failed:', err.message);
              process.exit(1);
            } finally {
              await pool.end();
            }
          "

      - name: Run Playwright tests (Chromium only for preview)
        id: playwright
        if: steps.check.outputs.is_client == 'true'
        working-directory: e2e
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          E2E_BROWSER_PROFILE: chromium
          E2E_WORKERS: "1"
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ADMIN_UID: ${{ secrets.E2E_ADMIN_UID }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: ${{ always() && steps.check.outputs.is_client == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright partial test results
        if: ${{ always() && steps.check.outputs.is_client == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: Delete Neon DB branch
        if: always() && steps.check.outputs.is_client == 'true' && steps.db.outputs.use_neon == 'true' && steps.neon.outputs.branch_id
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: ${{ steps.neon.outputs.branch_id }}

      - name: Job summary
        if: always()
        env:
          TARGET_URL: ${{ github.event.deployment_status.target_url }}
          IS_CLIENT: ${{ steps.check.outputs.is_client }}
          CHECK_OUTCOME: ${{ steps.check.outcome }}
          PW_OUTCOME: ${{ steps.playwright.outcome }}
          DB_SOURCE: ${{ steps.db.outputs.use_neon == 'true' && 'ephemeral Neon branch' || 'preview runtime DB (PREVIEW_DATABASE_URL)' }}
        run: |
          # Determine human-readable outcome label
          if [[ "$CHECK_OUTCOME" == "failure" ]]; then
            OUTCOME_LABEL="fail-fast: unknown deployment target pattern"
          elif [[ "$IS_CLIENT" == "false" ]]; then
            OUTCOME_LABEL="intentionally skipped (non-client deployment)"
          elif [[ "$PW_OUTCOME" == "success" ]]; then
            OUTCOME_LABEL="tests executed — passed"
          elif [[ "$PW_OUTCOME" == "failure" ]]; then
            OUTCOME_LABEL="tests executed — failed"
          elif [[ "$PW_OUTCOME" == "cancelled" ]]; then
            OUTCOME_LABEL="tests executed — cancelled"
          elif [[ "$PW_OUTCOME" == "skipped" ]]; then
            OUTCOME_LABEL="tests skipped"
          else
            OUTCOME_LABEL="unknown (check=$CHECK_OUTCOME, playwright=$PW_OUTCOME)"
          fi

          # Log to console
          echo "=== E2E Job Summary ==="
          echo "Target URL:     $TARGET_URL"
          echo "Is client:      $IS_CLIENT"
          echo "DB source:      $DB_SOURCE"
          echo "Check step:     $CHECK_OUTCOME"
          echo "Playwright step: $PW_OUTCOME"
          echo "Outcome:        $OUTCOME_LABEL"
          echo "========================"

          # Write to GitHub job summary
          {
            echo "## E2E Tests — Job Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Target URL** | \`$TARGET_URL\` |"
            echo "| **Is client** | \`$IS_CLIENT\` |"
            echo "| **DB source** | $DB_SOURCE |"
            echo "| **Check step** | \`$CHECK_OUTCOME\` |"
            echo "| **Playwright step** | \`$PW_OUTCOME\` |"
            echo "| **Outcome** | $OUTCOME_LABEL |"
          } >> "$GITHUB_STEP_SUMMARY"
