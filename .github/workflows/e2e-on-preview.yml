# Required check name: "E2E Tests (Playwright)"
# This name is registered as a required status check in GitHub rulesets
# for main. Do not rename without updating rulesets.
#
# Triggers on Vercel deployment_status events. Runs Playwright E2E tests
# against the client preview URL after a successful Preview deployment.
#
# Prerequisites (GitHub Settings):
#   - Secret: VERCEL_PROJECT_ID_CLIENT — the Vercel project ID for the client.
#     Used to distinguish client vs. server deployments. If absent, the job
#     fails explicitly instead of being silently skipped.
name: E2E Tests on Preview

on:
  deployment_status:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  e2e:
    name: E2E Tests (Playwright)
    # Run on every successful Preview deployment so the check name is always
    # emitted (required by branch protection). The project-ID filter is
    # handled inside the job to avoid silent skips when the variable is absent.
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Preview'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate deployment target
        id: check
        env:
          VERCEL_PROJECT_ID_CLIENT: ${{ secrets.VERCEL_PROJECT_ID_CLIENT }}
          DEPLOYMENT_PROJECT_ID: ${{ github.event.deployment.payload.projectId }}
        run: |
          if [ -z "$VERCEL_PROJECT_ID_CLIENT" ]; then
            echo "::error::VERCEL_PROJECT_ID_CLIENT secret is not configured. E2E tests cannot identify client deployments."
            exit 1
          fi
          if [ "$DEPLOYMENT_PROJECT_ID" != "$VERCEL_PROJECT_ID_CLIENT" ]; then
            echo "Deployment is for server project (got: $DEPLOYMENT_PROJECT_ID). Skipping E2E."
            echo "is_client=false" >> "$GITHUB_OUTPUT"
          else
            echo "Client deployment detected. Running E2E tests."
            echo "is_client=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check.outputs.is_client == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Setup Node.js
        if: steps.check.outputs.is_client == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        if: steps.check.outputs.is_client == 'true'
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check.outputs.is_client == 'true'
        working-directory: e2e
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Seed E2E test data
        if: steps.check.outputs.is_client == 'true'
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_UID: ${{ secrets.E2E_ADMIN_UID }}
          E2E_USER_UID: ${{ secrets.E2E_USER_UID }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_SUPER_ADMIN_UID: ${{ secrets.E2E_SUPER_ADMIN_UID }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
        run: |
          npm ci --omit=dev
          node scripts/seedE2EData.js

      - name: Run Playwright tests
        if: steps.check.outputs.is_client == 'true'
        working-directory: e2e
        env:
          BASE_URL: ${{ github.event.deployment_status.target_url }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ADMIN_UID: ${{ secrets.E2E_ADMIN_UID }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() && steps.check.outputs.is_client == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
