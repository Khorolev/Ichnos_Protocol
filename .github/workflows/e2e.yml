# E2E Tests — triggered by Vercel after a successful client preview deployment.
#
# Primary trigger: repository_dispatch (vercel.deployment.success)
#   Vercel fires this event after each successful deployment.
#   Enable "Repository Dispatch Events" in Vercel > Git settings (client project only).
#   Tests run against the stable staging domain (not the per-deployment hash URL,
#   which can become stale if Vercel cancels/supersedes the deployment).
#
# Debounce strategy:
#   A single git push triggers both client and server Vercel deployments. The client
#   deploys first and fires repository_dispatch, but the server (and its Neon ephemeral
#   DB branch) may still be deploying. Running tests immediately causes failures like
#   "Authentication timed out" or "Connection terminated unexpectedly" from Neon.
#
#   To solve this, a debounce step runs early in the job:
#   1. Sleep for a configurable window (default 90s) to let all deployments settle.
#   2. Query the GitHub API to check if a newer run of this workflow was queued
#      during the sleep (e.g., from a second push or Vercel re-deployment).
#   3. If a newer run exists → exit 0 (skip, the newer run will handle testing).
#   4. If this is the latest run → proceed with tests.
#
#   Combined with `cancel-in-progress: true`, this ensures only the latest dispatch
#   runs E2E tests, and only after all deployments have had time to complete.
#
# Secondary trigger: workflow_dispatch (manual/ad-hoc runs)
#   Accepts any base_url input for on-demand testing. Debounce is skipped.
name: E2E Tests (Playwright)

on:
  repository_dispatch:
    types: [vercel.deployment.success]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to run Playwright tests against"
        required: true
        type: string
      browser_profile:
        description: "Browser profile: 'chromium' (default) or 'full'"
        required: false
        default: chromium
        type: choice
        options:
          - chromium
          - full

permissions:
  contents: read
  statuses: write

# One E2E run per project. If a new deployment arrives for the same
# Vercel project, cancel the in-progress run (the old deployment is stale).
# Falls back to base_url for manual runs.
concurrency:
  group: e2e-${{ github.event.client_payload.project.name || inputs.base_url || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # For repository_dispatch: only run for client deployments (skip server).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'repository_dispatch' &&
        !contains(github.event.client_payload.project.name || '', 'server')
      )

    steps:
      - name: Dump Vercel payload (debug)
        if: github.event_name == 'repository_dispatch'
        run: echo '${{ toJSON(github.event.client_payload) }}' | jq '.' || true

      - name: Resolve BASE_URL
        id: deploy
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # Use the stable staging domain — per-deployment hash URLs can
            # become stale if Vercel cancels/supersedes the deployment.
            URL="${{ vars.E2E_BASE_URL }}"
            SHA="${{ github.event.client_payload.deployment.meta.githubCommitSha || github.event.client_payload.commitSha || '' }}"
            REF="${{ github.event.client_payload.deployment.meta.githubCommitRef || github.event.client_payload.branch || '' }}"
            echo "base_url=$URL" >> "$GITHUB_OUTPUT"
            echo "commit_sha=$SHA" >> "$GITHUB_OUTPUT"
            echo "Staging URL: $URL"
            echo "Vercel payload URL: ${{ github.event.client_payload.url }}"
            echo "Commit SHA: $SHA"
            echo "Branch: $REF"
          else
            echo "base_url=${{ inputs.base_url }}" >> "$GITHUB_OUTPUT"
            echo "commit_sha=" >> "$GITHUB_OUTPUT"
            echo "Manual run against: ${{ inputs.base_url }}"
          fi

      # ── Debounce ──────────────────────────────────────────────────────
      # A git push triggers both client and server Vercel deployments.
      # The client fires repository_dispatch first, but the server (and its
      # Neon ephemeral DB) may still be deploying. If we start immediately,
      # we hit transient errors ("Authentication timed out", "Connection
      # terminated unexpectedly") because the server/DB isn't ready.
      #
      # This step:
      # 1. Sleeps for DEBOUNCE_SECONDS to let all deployments finish.
      # 2. After waking, queries the GitHub API for newer runs of this
      #    workflow. If a newer run was queued during the sleep (e.g., from
      #    a rapid second push), THIS run exits 0 — the newer run will
      #    handle testing. Run IDs are monotonically increasing, so a
      #    higher ID means a newer run.
      # 3. If this is still the latest run, it proceeds to the expensive
      #    steps (browser install, readiness checks, Playwright tests).
      #
      # Skipped for workflow_dispatch (manual runs) since there's no
      # deployment race to debounce.
      - name: Debounce — wait for all deployments to settle
        if: github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          DEBOUNCE_SECONDS: "90"
        run: |
          CURRENT_RUN_ID="${{ github.run_id }}"
          echo "Run #${CURRENT_RUN_ID} — debouncing for ${DEBOUNCE_SECONDS}s..."
          sleep "$DEBOUNCE_SECONDS"

          # After sleeping, check if a newer run was triggered during the wait.
          # Query both queued and in_progress runs of this workflow.
          echo "Checking for newer workflow runs..."

          NEWER_RUN_ID=""
          for STATUS in "queued" "in_progress"; do
            CANDIDATE=$(gh api "repos/${{ github.repository }}/actions/workflows/e2e.yml/runs?status=${STATUS}&per_page=10" \
              --jq "[.workflow_runs[] | select(.id > $CURRENT_RUN_ID)] | sort_by(.id) | last | .id // empty" 2>/dev/null || true)
            if [ -n "$CANDIDATE" ]; then
              NEWER_RUN_ID="$CANDIDATE"
              break
            fi
          done

          if [ -n "$NEWER_RUN_ID" ]; then
            echo "Newer run found: #${NEWER_RUN_ID} (this is #${CURRENT_RUN_ID})."
            echo "Exiting — the newer run will handle E2E testing."
            # Exit 0 so the job shows as "success" (not "failure"), since this
            # is an intentional skip, not an error.
            exit 0
          fi

          echo "No newer runs found. This run (#${CURRENT_RUN_ID}) is the latest — proceeding."

      - name: Set pending commit status
        if: steps.deploy.outputs.commit_sha != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ steps.deploy.outputs.commit_sha }}" \
            -f state=pending \
            -f context="E2E Tests (Playwright)" \
            -f description="Running Playwright tests..." \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.deploy.outputs.commit_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Cache Playwright binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: e2e
        run: |
          PROFILE="${{ inputs.browser_profile || 'chromium' }}"
          if [ "$PROFILE" = "full" ]; then
            npx playwright install --with-deps
          else
            npx playwright install --with-deps chromium
          fi

      - name: Wait for deployment readiness
        env:
          BASE_URL: ${{ steps.deploy.outputs.base_url }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "Waiting for $BASE_URL to respond with HTTP 200..."
          CURL_ARGS=("-sL" "-o" "/dev/null" "-w" "%{http_code}")
          if [ -n "$BYPASS_SECRET" ]; then
            CURL_ARGS+=("-H" "x-vercel-protection-bypass: ${BYPASS_SECRET}")
            echo "Using Vercel protection bypass header."
          fi
          ATTEMPTS=0
          MAX_ATTEMPTS=36
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            STATUS=$(curl "${CURL_ARGS[@]}" "$BASE_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Deployment is ready (HTTP $STATUS)."
              exit 0
            fi
            ATTEMPTS=$((ATTEMPTS + 1))
            echo "Attempt $ATTEMPTS/$MAX_ATTEMPTS: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "::error::Deployment at $BASE_URL did not become ready within $((MAX_ATTEMPTS * 5))s."
          exit 1

      - name: Wait for API readiness and DB seed
        env:
          API_URL: ${{ vars.E2E_API_BASE_URL }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          HEALTH_URL="${API_URL}/api/health"
          echo "Polling ${HEALTH_URL} for readiness + seed completion..."
          CURL_ARGS=("-sL")
          if [ -n "$BYPASS_SECRET" ]; then
            CURL_ARGS+=("-H" "x-vercel-protection-bypass: ${BYPASS_SECRET}")
            echo "Using Vercel protection bypass header."
          fi
          ATTEMPTS=0
          MAX_ATTEMPTS=24
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            BODY=$(curl "${CURL_ARGS[@]}" "$HEALTH_URL" 2>/dev/null || true)
            STATUS=$(echo "$BODY" | jq -r '.status // empty' 2>/dev/null || true)
            SEEDED=$(echo "$BODY" | jq -r '.seed.seeded // empty' 2>/dev/null || true)
            SEED_ERR=$(echo "$BODY" | jq -r '.seed.error // empty' 2>/dev/null || true)

            if [ "$STATUS" = "ok" ]; then
              if [ "$SEEDED" = "true" ]; then
                echo "API healthy and seed complete."
                exit 0
              fi
              if [ -n "$SEED_ERR" ] && [ "$SEED_ERR" != "null" ]; then
                # Permanent errors (missing config) → fail immediately.
                # Transient errors (connection issues from Neon branch churn) → keep retrying.
                case "$SEED_ERR" in
                  *"missing required seed vars"*)
                    echo "::error::Seed failed on server: $SEED_ERR"
                    exit 1
                    ;;
                  *)
                    echo "Transient seed error: $SEED_ERR — retrying..."
                    ;;
                esac
              else
                echo "API healthy but seed in progress..."
              fi
            else
              echo "Attempt $((ATTEMPTS + 1))/$MAX_ATTEMPTS: non-JSON or error response — retrying in 5s..."
            fi

            ATTEMPTS=$((ATTEMPTS + 1))
            sleep 5
          done
          echo "::error::API at $HEALTH_URL did not become ready within $((MAX_ATTEMPTS * 5))s."
          exit 1

      - name: Run Playwright tests
        working-directory: e2e
        env:
          BASE_URL: ${{ steps.deploy.outputs.base_url }}
          E2E_BROWSER_PROFILE: ${{ inputs.browser_profile || 'chromium' }}
          E2E_WORKERS: "1"
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
          E2E_API_BASE_URL: ${{ vars.E2E_API_BASE_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY || secrets.VITE_FIREBASE_API_KEY }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npx playwright test

      - name: Set final commit status
        if: always() && steps.deploy.outputs.commit_sha != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATE="success"
            DESC="Playwright tests passed"
          else
            STATE="failure"
            DESC="Playwright tests failed"
          fi
          gh api "repos/${{ github.repository }}/statuses/${{ steps.deploy.outputs.commit_sha }}" \
            -f state="$STATE" \
            -f context="E2E Tests (Playwright)" \
            -f description="$DESC" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          if-no-files-found: warn
          retention-days: 14
