name: E2E Tests (Playwright)

# Automated E2E runs as a job inside vercel-preview-on-main.yml.
# This file is kept for manual / ad-hoc runs against any deployed URL.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Client URL to run E2E tests against'
        required: true
        type: string
      ref:
        description: 'Branch, tag, or commit SHA to check out (defaults to main)'
        required: false
        type: string
        default: ''

permissions:
  actions: read
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Seed E2E test data
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_UID: ${{ secrets.E2E_ADMIN_UID }}
          E2E_USER_UID: ${{ secrets.E2E_USER_UID }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_SUPER_ADMIN_UID: ${{ secrets.E2E_SUPER_ADMIN_UID }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
        run: |
          if [ -n "$E2E_ADMIN_EMAIL" ] && [ -n "$E2E_ADMIN_UID" ] && [ -n "$DATABASE_URL" ]; then
            npm ci --omit=dev
            node scripts/seedE2EData.js
          else
            echo "Skipping E2E seed: required env vars not set"
          fi

      - name: Run Playwright tests
        working-directory: e2e
        env:
          BASE_URL: ${{ inputs.base_url }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ADMIN_UID: ${{ secrets.E2E_ADMIN_UID }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
