# Manual E2E test runner — for ad-hoc runs against any deployed URL.
#
# The primary E2E trigger is inside ci.yml (pull_request).
# This workflow is kept for manual/ad-hoc runs only.
name: E2E Tests (Manual)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to run Playwright tests against"
        required: true
        type: string
      browser_profile:
        description: "Browser profile: 'chromium' (default) or 'full' (Chromium + Firefox + WebKit)"
        required: false
        default: chromium
        type: choice
        options:
          - chromium
          - full

permissions:
  contents: read

concurrency:
  group: e2e-manual-${{ inputs.base_url }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  e2e:
    name: E2E Tests (Manual)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Cache Playwright binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: e2e
        run: |
          if [ "${{ inputs.browser_profile }}" = "full" ]; then
            npx playwright install --with-deps
          else
            npx playwright install --with-deps chromium
          fi

      - name: Wait for deployment readiness
        env:
          BASE_URL: ${{ inputs.base_url }}
        run: |
          echo "Waiting for $BASE_URL to respond with HTTP 200..."
          ATTEMPTS=0
          MAX_ATTEMPTS=24
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Deployment is ready (HTTP $STATUS)."
              exit 0
            fi
            ATTEMPTS=$((ATTEMPTS + 1))
            echo "Attempt $ATTEMPTS/$MAX_ATTEMPTS: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "::error::Deployment at $BASE_URL did not become ready within $((MAX_ATTEMPTS * 5))s."
          exit 1

      - name: Run Playwright tests
        working-directory: e2e
        env:
          BASE_URL: ${{ inputs.base_url }}
          E2E_BROWSER_PROFILE: ${{ inputs.browser_profile }}
          E2E_WORKERS: "1"
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_SUPER_ADMIN_EMAIL: ${{ secrets.E2E_SUPER_ADMIN_EMAIL }}
          E2E_SUPER_ADMIN_PASSWORD: ${{ secrets.E2E_SUPER_ADMIN_PASSWORD }}
          E2E_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY || secrets.VITE_FIREBASE_API_KEY }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          if-no-files-found: warn
          retention-days: 14
